services:
  redshift-emulator:
    build: .
    image: redshift-emulator:latest
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - redshift-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redshift-data:
